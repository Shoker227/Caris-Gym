:root{
  --black:#09090f;--card:#13141e;--card2:#0f1118;--border:#1e2030;
  --white:#f0f0f8;--muted:#6b6e88;
  --orange:#f59e0b;--orange-dim:rgba(245,158,11,.12);
  --mg:#22c55e;--mg-dim:rgba(34,197,94,.12);
  --rest:#a78bfa;--rest-dim:rgba(167,139,250,.12);
  --prep:#06b6d4;--prep-dim:rgba(6,182,212,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;font-size:15px;line-height:1.6;padding-bottom:env(safe-area-inset-bottom);overflow-x:hidden;}

header{background:linear-gradient(135deg,#1a0d00 0%,#05080f 60%);border-bottom:2px solid var(--orange);padding:calc(1.4rem + env(safe-area-inset-top)) 1.5rem 1.2rem;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(245,158,11,.15) 0%,transparent 70%);border-radius:50%;}
.tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:.3rem;position:relative;}
h1{font-family:'Bebas Neue',sans-serif;font-size:2.6rem;line-height:1;letter-spacing:2px;position:relative;}
h1 .accent{color:var(--orange);}
.subtitle{color:var(--muted);font-size:11px;margin-top:.3rem;position:relative;}

.info-bar{background:var(--card2);padding:.7rem 1rem;border-bottom:1px solid var(--border);font-size:11px;color:var(--muted);text-align:center;}
.info-bar strong{color:var(--prep);}

.tabs-wrap{position:sticky;top:0;z-index:10;background:var(--card2);border-bottom:1px solid var(--border);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:1.5px;padding:.7rem .9rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0;min-height:44px;display:flex;align-items:center;-webkit-appearance:none;background:none;border-top:none;border-left:none;border-right:none;gap:.4rem;}
.tab.active{color:var(--white);border-bottom-color:var(--orange);}
.tab:active{background:rgba(255,255,255,.04);}
.tab-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.tab-dot.t-entreno{background:var(--mg);}
.tab-dot.t-descanso{background:var(--rest);}
.tab-dot.t-prep{background:var(--prep);}

main{padding:.9rem 1rem 2rem;}

.day-header{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;}
.day-header.entreno{border-left:4px solid var(--mg);}
.day-header.descanso{border-left:4px solid var(--rest);}
.day-name{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;line-height:1;}
.day-type{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-top:.3rem;}
.day-type.entreno{color:var(--mg);}
.day-type.descanso{color:var(--rest);}
.day-workout{font-size:11px;color:var(--muted);margin-top:.2rem;}

.meal-grid{display:flex;flex-direction:column;gap:.9rem;}
.meal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.meal-card.has-prep{border-left:3px solid var(--prep);}
.meal-header{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);}
.meal-icon{font-size:1.2rem;flex-shrink:0;}
.meal-info{flex:1;min-width:0;}
.meal-name{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1.5px;color:var(--orange);}

.special-tag{display:inline-block;font-size:9px;font-weight:600;letter-spacing:1px;padding:2px 8px;border-radius:4px;background:var(--orange-dim);color:var(--orange);border:1px solid rgba(245,158,11,.3);margin-top:5px;}

.legend{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;}
.legend-title{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--muted);margin-bottom:.6rem;}

.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

.tip-card{background:var(--orange-dim);border:1px solid rgba(245,158,11,.25);border-radius:12px;padding:.9rem 1.1rem;margin-top:1rem;font-size:12px;color:var(--muted);line-height:1.6;}

.prep-intro-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--prep);margin-bottom:.4rem;}
.prep-intro-text{font-size:12px;color:var(--muted);line-height:1.6;}
.prep-intro-text strong{color:var(--white);}

.recipe-card{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--prep);border-radius:12px;overflow:hidden;margin-bottom:1rem;}
.recipe-header{padding:.85rem 1.1rem;display:flex;align-items:center;gap:.7rem;border-bottom:1px solid var(--border);background:rgba(6,182,212,.04);}
.recipe-icon{font-size:1.6rem;flex-shrink:0;}
.recipe-info{flex:1;min-width:0;}
.recipe-id{font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:2px;color:var(--prep);}
.recipe-name{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:1px;line-height:1.1;}
.recipe-days{font-size:11px;color:var(--muted);margin-top:2px;}

.recipe-body{padding:1rem 1.1rem;}
.recipe-section-title{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px;color:var(--muted);margin-bottom:.5rem;margin-top:.8rem;}
.recipe-section-title:first-child{margin-top:0;}
.recipe-list{display:flex;flex-direction:column;gap:.4rem;}
.recipe-list-item{display:flex;gap:.5rem;font-size:12.5px;color:var(--muted);align-items:flex-start;line-height:1.5;}
.recipe-list-item .num{font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:var(--prep);min-width:18px;flex-shrink:0;padding-top:1px;}
.recipe-list-item.ing::before{content:'•';color:var(--prep);flex-shrink:0;}

.shopping-list{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-top:1.5rem;}
.shopping-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:var(--orange);margin-bottom:.7rem;}
.shopping-section{margin-bottom:.7rem;}
.shopping-section-name{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;font-weight:600;}
.shopping-items{font-size:12px;color:var(--white);line-height:1.6;}

footer{text-align:center;padding:1.2rem 1rem;padding-bottom:calc(1.2rem + env(safe-area-inset-bottom));font-size:10px;color:#22243a;border-top:1px solid var(--border);margin-top:1.5rem;}

liva y orégano"], "kcal": "~680", "protein": "45g"}, {"name": "Merienda", "time": "18:00", "title": "Picoteo fresco", "items": ["Sandía o melón troceado", "1 yogur griego natural", "15 g almendras"], "kcal": "~280", "protein": "12g"}, {"name": "Cena", "time": "21:30", "title": "Cena libre / social", "items": ["Día flexible — disfrutad", "Idealmente: ensalada + proteína a la plancha", "Evitar fritos y alcohol excesivo", "Beber mucha agua"], "kcal": "~600-800", "protein": "30-40g"}]}, {"day": "DOMINGO", "type": "descanso", "meals": [{"name": "Desayuno", "time": "9:00", "simple": true, "title": "Yogur griego con fruta y muesli", "items": ["250 g yogur griego", "Fruta de temporada (melocotón, sandía, fresas)", "40 g muesli", "10 g nueces", "Miel al gusto"], "kcal": "~480", "protein": "24g"}, {"name": "Comida", "time": "14:30", "special": "COCINA DEL DÍA", "title": "Pollo al horno con verduras (recién hecho)", "items": ["200 g pollo al horno con limón y especias", "150 g patatas en gajos al horno", "Ensalada verde abundante", "Aceite oliva"], "kcal": "~700", "protein": "50g"}, {"name": "Merienda", "time": "18:00", "title": "Yogur con frutos secos", "items": ["200 g yogur natural", "1 fruta de temporada", "15 g frutos secos variados"], "kcal": "~280", "protein": "15g"}, {"name": "Cena", "time": "21:00", "special": "COCINA DEL DÍA", "title": "Ensalada completa + huevos", "items": ["Lechuga, tomate, pepino, cebolla, atún en aceite (opcional)", "2 huevos cocidos", "40 g queso fresco", "Aceitunas y aguacate"], "kcal": "~480", "protein": "35g"}]}];

function buildTabs(){
  var tabs = document.getElementById('tabs');
  // Add prep tab first
  var prepBtn = document.createElement('button');
  prepBtn.className = 'tab active';
  prepBtn.innerHTML = '<span class="tab-dot t-prep"></span>📦 MEAL PREP';
  prepBtn.onclick = function(){showPrep(prepBtn);};
  tabs.appendChild(prepBtn);

  MENU.forEach(function(d,i){
    var btn = document.createElement('button');
    btn.className = 'tab';
    btn.innerHTML = '<span class="tab-dot t-'+d.type+'"></span>' + d.day.substring(0,3);
    btn.onclick = function(){showDay(i,btn);};
    tabs.appendChild(btn);
  });
}

function buildLegend(){
  var html = '<div class="legend"><div class="legend-title">LEYENDA</div><div class="legend-items">';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--mg)"></div>Día de entreno</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--rest)"></div>Día de descanso</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--prep)"></div>Meal prep</div>';
  html += '</div></div>';
  return html;
}

function showPrep(btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  var main = document.getElementById('main');
  var html = '';

  html += '<div class="prep-intro">';
  html += '<div class="prep-intro-title">📦 PLAN DEL DOMINGO</div>';
  html += '<div class="prep-intro-text">Cocinad estas <strong>3 recetas el domingo</strong> y tendréis listas las comidas hasta el sábado. Cada receta da para 2 raciones grandes (una por persona, 2 días). Los desayunos son simples para hacer en el trabajo. Las cenas son frescas, sin cocinar mucho.</div>';
  html += '</div>';

  PREP.forEach(function(r){
    html += '<div class="recipe-card">';
    html += '<div class="recipe-header">';
    html += '<div class="recipe-icon">'+r.icon+'</div>';
    html += '<div class="recipe-info">';
    html += '<div class="recipe-id">RECETA '+r.id+'</div>';
    html += '<div class="recipe-name">'+r.name+'</div>';
    html += '<div class="recipe-days">📅 '+r.days+'</div>';
    html += '</div></div>';
    html += '<div class="recipe-body">';
    html += '<div class="recipe-section-title">INGREDIENTES (2 raciones)</div>';
    html += '<div class="recipe-list">';
    r.ingredients.forEach(function(i){html += '<div class="recipe-list-item ing">'+i+'</div>';});
    html += '</div>';
    html += '<div class="recipe-section-title">PREPARACIÓN</div>';
    html += '<div class="recipe-list">';
    r.steps.forEach(function(s,idx){html += '<div class="recipe-list-item"><span class="num">'+(idx+1)+'</span><span>'+s+'</span></div>';});
    html += '</div></div></div>';
  });

  // Shopping list
  html += '<div class="shopping-list">';
  html += '<div class="shopping-title">🛒 LISTA DE LA COMPRA (semanal)</div>';
  html += '<div class="shopping-section">';
  html += '<div class="shopping-section-name">CARNES Y PROTEÍNAS</div>';
  html += '<div class="shopping-items">1 kg pechuga de pollo · 200 g pavo en lonchas · 200 g jamón cocido · 100 g jamón serrano · 100 g queso fresco · 50 g queso curado · 18 huevos</div>';
  html += '</div>';
  html += '<div class="shopping-section">';
  html += '<div class="shopping-section-name">VERDURAS Y FRUTAS</div>';
  html += '<div class="shopping-items">Lechugas, tomates (cherry y normal), pepino, pimientos, cebolla, zanahoria, calabacín, berenjena, aguacates (3-4), plátanos, sandía o melón, frutos rojos</div>';
  html += '</div>';
  html += '<div class="shopping-section">';
  html += '<div class="shopping-section-name">HIDRATOS Y LEGUMBRES</div>';
  html += '<div class="shopping-items">200 g arroz · 300 g pasta integral · 300 g lentejas pardinas · Avena (1 paquete) · Pan integral · Tortillas de trigo</div>';
  html += '</div>';
  html += '<div class="shopping-section">';
  html += '<div class="shopping-section-name">LÁCTEOS Y OTROS</div>';
  html += '<div class="shopping-items">Yogur griego (1 kg) · Yogur natural (8 unidades) · Leche · Gazpacho y/o salmorejo · Almendras, nueces · Aceite oliva · Vinagre · Maíz, aceitunas</div>';
  html += '</div>';
  html += '</div>';

  html += '<div class="tip-card">💡 <strong>Trucos clave:</strong> los tuppers de cristal conservan mejor que los de plástico. Guardad las salsas/vinagretas aparte y añadidlas justo antes de comer para que no se pongan blandas las ensaladas. El pollo cocido aguanta 4 días en nevera bien conservado.</div>';

  main.innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});

function showDay(i, btn){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn)btn.classList.add('active');
  var d = MENU[i];
  var main = document.getElementById('main');
  var html = '';
  html += buildLegend();
  html += '<div class="day-header '+d.type+'">';
  html += '<div class="day-name">'+d.day+'</div>';
  html += '<div class="day-type '+d.type+'">'+(d.type==='entreno'?'🔥 DÍA DE ENTRENO':'😌 DÍA DE DESCANSO')+'</div>';
  if(d.workout){html += '<div class="day-workout">'+d.workout+'</div>';}
  html += '</div>';
  html += '<div class="meal-grid">';
  d.meals.forEach(function(m){
    var prepClass = m.prep ? ' has-prep' : '';
    html += '<div class="meal-card'+prepClass+'">';
    html += '<div class="meal-header">';
    html += '<div class="meal-icon">'+(icons[m.name]||'🍴')+'</div>';
    html += '<div class="meal-info">';
    html += '<div class="meal-name">'+m.name+'</div>';
    html += '<div class="meal-time">'+m.time+' h</div>';
    html += '</div>';
    html += '<div class="meal-stats">';
    html += '<div class="meal-kcal">'+m.kcal+' kcal</div>';
    html += '<div class="meal-protein">'+m.protein+' prot.</div>';
    html += '</div></div>';
    html += '<div class="meal-body">';
    html += '<div class="meal-title">'+m.title+'</div>';
    if(m.prep){html += '<span class="prep-tag">📦 '+m.prep+'</span>';}
    if(m.simple){html += '<span class="simple-tag">⚡ SIN COCINAR</span>';}
    if(m.special){html += '<span class="special-tag">🍳 '+m.special+'</span>';}
    html += '<div class="meal-items" style="margin-top:.5rem">';
    m.items.forEach(function(it){html += '<div class="meal-item">'+it+'</div>';});
    html += '</div></div></div>';
  });
  html += '</div>';

  if(d.type==='entreno'){
    html += '<div class="tip-card">🔥 <strong>Día de entreno:</strong> el batido post-entreno con creatina es clave. Mantened proteína alta (~150-180 g/día). El arroz y la pasta del meal prep aportan los carbos necesarios para entrenar fuerte.</div>';
  }else{
    html += '<div class="tip-card">😌 <strong>Día de descanso:</strong> las legumbres del meal prep son perfectas — sacian, son ligeras y aportan proteína vegetal. Aprovechad para hidrataros más con sandía, melón y gazpacho.</div>';
  }

  main.innerHTML = html;
  window.scrollTo({top:0,behavior:'smooth'});
}

buildTabs();
showPrep(document.querySelector('.tab'));
</script>
